<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>SILLY SOCKS | ARCADE DROP</title>
<style>
/* --- 80s SYNTHWAVE / MEMPHIS THEME --- */
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Montserrat:wght@400;800;900&display=swap');

:root {
  --bg: #0b0c10;
  --text: #ffffff;
  --accent-1: #ff00ff;
  --accent-2: #00ffff;
  --accent-3: #ffff00;
  --card-bg: rgba(20, 10, 30, 0.95);
  --card-border: #ff00ff;
}
[data-theme="light"] {
  --bg: #f4f4f4;
  --text: #111111;
  --text-muted: #555555;
  --accent-1: #ff007f;
  --accent-2: #00e5ff;
  --accent-3: #ffea00;
  --card-bg: #ffffff;
  --card-border: #111111;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Montserrat', sans-serif;
  background-color: var(--bg);
  color: var(--text);
  height: 100vh;
  overflow-y: hidden;
  transition: 0.5s;
}

/* --- ANIMATED BACKGROUND SHAPES --- */
.shape-container {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: -1;
  overflow: hidden;
}

.floating-shape {
  position: absolute;
  opacity: 0.6;
  animation: float 8s infinite ease-in-out;
}

@keyframes float {
  0%, 100% { transform: translateY(0) rotate(0deg); }
  50% { transform: translateY(-30px) rotate(180deg); }
}

.triangle {
  width: 0;
  height: 0;
  border-left: 30px solid transparent;
  border-right: 30px solid transparent;
  border-bottom: 50px solid var(--accent-1);
}

.circle {
  width: 60px;
  height: 60px;
  border-radius: 50%;
  background: var(--accent-2);
}

.square {
  width: 50px;
  height: 50px;
  background: var(--accent-3);
  transform: rotate(45deg);
}

.zigzag {
  width: 80px;
  height: 40px;
  background: repeating-linear-gradient(
    45deg,
    var(--accent-1),
    var(--accent-1) 10px,
    var(--accent-2) 10px,
    var(--accent-2) 20px
  );
}

.wave {
  width: 100px;
  height: 30px;
  background: linear-gradient(
    90deg,
    var(--accent-3),
    var(--accent-1),
    var(--accent-2)
  );
  border-radius: 50%;
}

/* --- GRID & HERO --- */
.synth-grid {
  position: fixed;
  bottom: -20vh;
  left: -50vw;
  width: 200vw;
  height: 70vh;
  background-image:
    linear-gradient(rgba(0,255,255,0.2) 2px, transparent 2px),
    linear-gradient(90deg, rgba(0,255,255,0.2) 2px, transparent 2px);
  background-size: 50px 50px;
  transform: perspective(600px) rotateX(70deg);
  z-index: -2;
  pointer-events: none;
  animation: gridMove 20s linear infinite;
}

@keyframes gridMove {
  0% { background-position: 0 0; }
  100% { background-position: 0 1000px; }
}

#hero, #ttt-screen, #gate, #access-granted {
  position: fixed;
  top:0;
  left:0;
  width:100vw;
  height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  background: var(--bg);
  z-index: 5000;
  cursor: pointer;
  transition: 0.5s;
}
#ttt-screen, #gate, #access-granted { display: none; }

.hero-logo {
  font-family: 'Press Start 2P';
  font-size: 32px;
  text-shadow: 0 0 10px var(--accent-1), 0 0 20px var(--accent-2), 0 0 30px var(--accent-3);
  margin-bottom: 20px;
  text-align: center;
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.05); }
}

/* --- RETRO UI --- */
.retro-box {
  width: 90%;
  max-width: 450px;
  text-align: center;
  padding: 2rem;
  background: var(--card-bg);
  border: 4px solid var(--card-border);
  box-shadow: 0 0 20px var(--accent-1), inset 0 0 20px rgba(255,0,255,0.1);
  animation: boxGlow 3s infinite alternate;
}

@keyframes boxGlow {
  from { box-shadow: 0 0 20px var(--accent-1), inset 0 0 20px rgba(255,0,255,0.1); }
  to { box-shadow: 0 0 40px var(--accent-2), inset 0 0 40px rgba(0,255,255,0.1); }
}

.retro-btn {
  padding: 12px 20px;
  background: var(--accent-1);
  border: 2px solid white;
  color: #fff;
  font-family: 'Press Start 2P';
  font-size: 8px;
  cursor: pointer;
  margin-top: 20px;
  text-transform: uppercase;
  transition: all 0.3s;
  position: relative;
  overflow: hidden;
}

.retro-btn:hover {
  background: var(--accent-2);
  transform: translateY(-3px);
  box-shadow: 0 5px 15px var(--accent-2);
}

.retro-btn::before {
  content: '';
  position: absolute;
  top: -50%;
  left: -50%;
  width: 200%;
  height: 200%;
  background: linear-gradient(45deg, transparent, rgba(255,255,255,0.3), transparent);
  transform: rotate(45deg);
  animation: shine 3s infinite;
}

@keyframes shine {
  0% { transform: translateX(-100%) rotate(45deg); }
  100% { transform: translateX(100%) rotate(45deg); }
}

.ttt-board {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 4px;
  width: 200px;
  margin: 20px auto;
  background: var(--card-border);
  padding: 4px;
  border: 2px solid var(--accent-2);
}

.ttt-cell {
  background: #000;
  height: 60px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Press Start 2P';
  font-size: 20px;
  cursor: pointer;
  color: white;
  transition: all 0.2s;
}

.ttt-cell:hover {
  background: var(--accent-1);
  transform: scale(1.05);
}

/* --- ACCESS GRANTED SCREEN --- */
.access-content {
  text-align: center;
  animation: slideIn 0.5s ease-out;
}

@keyframes slideIn {
  from { transform: translateY(-50px); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}

.access-title {
  font-family: 'Press Start 2P';
  font-size: 24px;
  color: var(--accent-2);
  text-shadow: 0 0 10px var(--accent-2), 0 0 20px var(--accent-2);
  margin-bottom: 20px;
  animation: flicker 0.1s infinite;
}

@keyframes flicker {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.8; }
}

.access-message {
  font-family: 'Press Start 2P';
  font-size: 12px;
  color: var(--accent-3);
  margin-bottom: 30px;
  line-height: 1.8;
}

.access-enter-btn {
  padding: 15px 30px;
  background: var(--accent-2);
  border: 3px solid var(--accent-3);
  color: #000;
  font-family: 'Press Start 2P';
  font-size: 10px;
  cursor: pointer;
  text-transform: uppercase;
  animation: bounce 1s infinite;
}

@keyframes bounce {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}

/* --- CATALOG --- */
#catalog {
  display: none;
  padding-bottom: 50px;
  overflow-y: auto;
  height: 100vh;
}

.cat-header {
  background: var(--card-bg);
  border-bottom: 4px solid var(--card-border);
  padding: 15px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  position: sticky;
  top:0;
  z-index: 100;
  backdrop-filter: blur(10px);
}

.cam-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
  gap: 20px;
  padding: 1rem;
}

.cam-card {
  background: var(--card-bg);
  border: 3px solid var(--card-border);
  padding: 10px;
  text-align: center;
  transition: all 0.3s;
  position: relative;
  overflow: hidden;
}

.cam-card:hover {
  transform: translateY(-5px);
  box-shadow: 0 10px 30px var(--accent-1);
  border-color: var(--accent-2);
}

.cam-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: -100%;
  width: 100%;
  height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
  transition: 0.5s;
}

.cam-card:hover::before {
  left: 100%;
}

.cam-img {
  width: 100%;
  height: 180px;
  object-fit: cover;
  background: #fff;
  border: 2px solid var(--accent-2);
  transition: transform 0.3s;
}

.cam-card:hover .cam-img {
  transform: scale(1.05);
}

.cam-name {
  font-family: 'Press Start 2P';
  font-size: 8px;
  margin: 10px 0;
  color: var(--accent-3);
}

.buy-btn {
  width: 100%;
  padding: 10px;
  background: var(--accent-1);
  border: none;
  color: #fff;
  font-family: 'Press Start 2P';
  font-size: 8px;
  cursor: pointer;
  margin-top: 10px;
  transition: all 0.3s;
}

.buy-btn:hover {
  background: var(--accent-2);
  transform: scale(1.05);
}

.theme-toggle-btn {
  background: var(--bg);
  color: var(--text);
  border: 1px solid var(--accent-3);
  padding: 5px 8px;
  font-family: 'Press Start 2P';
  font-size: 7px;
  cursor: pointer;
  transition: all 0.3s;
}

.theme-toggle-btn:hover {
  background: var(--accent-3);
  color: #000;
}

/* --- SCROLLBAR --- */
#catalog::-webkit-scrollbar {
  width: 10px;
}

#catalog::-webkit-scrollbar-track {
  background: var(--bg);
}

#catalog::-webkit-scrollbar-thumb {
  background: var(--accent-1);
  border: 2px solid var(--accent-2);
}

#catalog::-webkit-scrollbar-thumb:hover {
  background: var(--accent-2);
}

/* --- RESPONSIVE --- */
@media (max-width: 600px) {
  .hero-logo { font-size: 20px; }
  .retro-box { padding: 1rem; }
  .ttt-board { width: 150px; }
  .ttt-cell { height: 45px; font-size: 16px; }
}
</style>
</head>
<body>

<!-- Animated Background Shapes -->
<div class="shape-container">
  <div class="floating-shape triangle" style="top: 10%; left: 10%; animation-delay: 0s;"></div>
  <div class="floating-shape circle" style="top: 20%; left: 80%; animation-delay: 1s;"></div>
  <div class="floating-shape square" style="top: 60%; left: 15%; animation-delay: 2s;"></div>
  <div class="floating-shape zigzag" style="top: 40%; left: 70%; animation-delay: 3s;"></div>
  <div class="floating-shape wave" style="top: 80%; left: 50%; animation-delay: 4s;"></div>
  <div class="floating-shape triangle" style="top: 30%; left: 40%; animation-delay: 5s; border-bottom-color: var(--accent-2);"></div>
  <div class="floating-shape circle" style="top: 70%; left: 25%; animation-delay: 6s; background: var(--accent-3);"></div>
  <div class="floating-shape square" style="top: 15%; left: 60%; animation-delay: 7s; background: var(--accent-1);"></div>
  <div class="floating-shape zigzag" style="top: 50%; left: 5%; animation-delay: 8s;"></div>
  <div class="floating-shape wave" style="top: 90%; left: 85%; animation-delay: 9s;"></div>
</div>

<div class="synth-grid"></div>

<div id="hero" onclick="showTTT()">
  <h1 class="hero-logo">SILLY SOCKS</h1>
  <p style="font-family: 'Press Start 2P'; color: var(--accent-3); font-size: 10px; animation: blink 1s infinite;">>> CLICK TO START <<</p>
</div>

<div id="ttt-screen">
  <div class="retro-box">
    <h2 style="font-family: 'Press Start 2P'; color: var(--accent-1); margin-bottom: 20px; font-size: 12px;">BEAT THE BOT</h2>
    <div class="ttt-board" id="board">
      <div class="ttt-cell" onclick="move(0)"></div>
      <div class="ttt-cell" onclick="move(1)"></div>
      <div class="ttt-cell" onclick="move(2)"></div>
      <div class="ttt-cell" onclick="move(3)"></div>
      <div class="ttt-cell" onclick="move(4)"></div>
      <div class="ttt-cell" onclick="move(5)"></div>
      <div class="ttt-cell" onclick="move(6)"></div>
      <div class="ttt-cell" onclick="move(7)"></div>
      <div class="ttt-cell" onclick="move(8)"></div>
    </div>
    <button class="retro-btn" onclick="showGate()">I HAVE A CODE</button>
  </div>
</div>

<div id="gate">
  <div class="retro-box">
    <h2 style="font-family: 'Press Start 2P'; color: var(--accent-1); margin-bottom: 20px; font-size: 12px;">SYSTEM LOCKED</h2>
    <input id="refInput" type="text" placeholder="ENTER CODE..." style="width: 100%; padding: 12px; background: #000; color: #fff; border: 2px solid var(--accent-2); font-family: 'Press Start 2P'; font-size: 8px; margin-bottom: 10px;" />
    <button class="retro-btn" onclick="checkCode()">ACCESS</button>
  </div>
</div>

<div id="access-granted">
  <div class="access-content">
    <h1 class="access-title">ACCESS GRANTED</h1>
    <p class="access-message">WELCOME TO THE<br>SOCK ZONE</p>
    <button class="access-enter-btn" onclick="enterCatalog()">ENTER CATALOG</button>
  </div>
</div>

<div id="catalog">
  <header class="cat-header">
    <div style="font-family: 'Press Start 2P'; font-size: 12px; color: var(--accent-1);">SILLY SOCKS</div>
    <div>
      <span id="broName" style="font-family: 'Press Start 2P'; font-size: 8px; margin-right: 10px; color: var(--accent-3);">PLAYER</span>
      <button class="theme-toggle-btn" onclick="toggleTheme()">[ DAY/NIGHT ]</button>
    </div>
  </header>
  <div class="cam-grid" id="grid"></div>
</div>

<script>
// --- LOGIC ---
function toggleTheme() {
  document.body.dataset.theme = document.body.dataset.theme === 'light' ? '' : 'light';
}

function showTTT() {
  document.getElementById('hero').style.display = 'none';
  document.getElementById('ttt-screen').style.display = 'flex';
}

function showGate() {
  document.getElementById('ttt-screen').style.display = 'none';
  document.getElementById('gate').style.display = 'flex';
}

function showAccessGranted() {
  document.getElementById('gate').style.display = 'none';
  document.getElementById('access-granted').style.display = 'flex';
}

function enterCatalog() {
  document.getElementById('access-granted').style.display = 'none';
  document.getElementById('catalog').style.display = 'block';
}

let board = ["", "", "", "", "", "", "", "", ""];
let gameActive = true;

function move(i) {
  if(board[i] === "" && gameActive) {
    board[i] = "X";
    document.querySelectorAll('.ttt-cell')[i].innerText = "X";
    document.querySelectorAll('.ttt-cell')[i].style.color = "var(--accent-2)";

    if(checkWin("X")) {
      gameActive = false;
      setTimeout(showGate, 500);
    } else if(!board.includes("")) {
      // Draw - reset board
      setTimeout(resetBoard, 500);
    } else {
      setTimeout(bot, 300);
    }
  }
}

function bot() {
  if(!gameActive) return;
  let empty = board.map((v,i) => v === "" ? i : null).filter(v => v !== null);
  if(empty.length > 0) {
    let r = empty[Math.floor(Math.random()*empty.length)];
    board[r] = "O";
    document.querySelectorAll('.ttt-cell')[r].innerText = "O";
    document.querySelectorAll('.ttt-cell')[r].style.color = "var(--accent-1)";

    if(checkWin("O")) {
      gameActive = false;
      setTimeout(() => {
        alert("BOT WINS! TRY AGAIN!");
        resetBoard();
      }, 300);
    } else if(!board.includes("")) {
      setTimeout(resetBoard, 500);
    }
  }
}

function resetBoard() {
  board = ["", "", "", "", "", "", "", "", ""];
  gameActive = true;
  document.querySelectorAll('.ttt-cell').forEach(cell => {
    cell.innerText = "";
    cell.style.color = "white";
  });
}

function checkWin(p) {
  return [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]]
    .some(a => a.every(i => board[i] === p));
}

function checkCode() {
  let codes = ["tauhid", "songlap", "fouzia", "anhar"];
  if(codes.includes(document.getElementById('refInput').value.toLowerCase())) {
    showAccessGranted();
  } else {
    alert("INVALID CODE!");
  }
}

// Catalog Data with actual image URLs
let data = [
  {n:"Neon Stripe", i:"https://images.unsplash.com/photo-1586350977771-b3b0abd50c82?w=300&h=200&fit=crop"},
  {n:"Retro Wave", i:"https://images.unsplash.com/photo-1543163521-1bf539c55dd2?w=300&h=200&fit=crop"},
  {n:"Cyber Punk", i:"https://images.unsplash.com/photo-1520903920243-00d872a2d1c9?w=300&h=200&fit=crop"},
  {n:"Synth Pop", i:"https://images.unsplash.com/photo-1560769629-975ec94e6a86?w=300&h=200&fit=crop"},
  {n:"Electric Blue", i:"https://images.unsplash.com/photo-1511556532299-8f662fc26c06?w=300&h=200&fit=crop"},
  {n:"Hot Pink", i:"https://images.unsplash.com/photo-1533038590840-1cde6e668a91?w=300&h=200&fit=crop"},
  {n:"Geometric", i:"https://images.unsplash.com/photo-1574634534894-89d7576c8259?w=300&h=200&fit=crop"},
  {n:"Abstract", i:"https://images.unsplash.com/photo-1582219459877-0df9c4f4cc2c?w=300&h=200&fit=crop"},
  {n:"Classic 80s", i:"https://images.unsplash.com/photo-1551488852-d81a2c5c7813?w=300&h=200&fit=crop"},
  {n:"Memphis", i:"https://images.unsplash.com/photo-1576566588028-4147f3842f27?w=300&h=200&fit=crop"}
];

let grid = document.getElementById('grid');
data.forEach(item => {
  grid.innerHTML += `
    <div class="cam-card">
      <img src="${item.i}" class="cam-img" onerror="this.src='https://placehold.co/300x200/ff00ff/ffffff?text=SOCK+IMG'">
      <div class="cam-name">${item.n}</div>
      <button class="buy-btn">BUY NOW</button>
    </div>
  `;
});

// Add blink animation for hero text
const style = document.createElement('style');
style.textContent = `
  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }
`;
document.head.appendChild(style);
</script>
</body>
</html>
